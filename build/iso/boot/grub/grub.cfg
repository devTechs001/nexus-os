set timeout=10
set timeout_style=menu
set default=0

# Load graphical theme
if loadfont /boot/grub/fonts/unicode.pf2 ; then
    set gfxmode=1920x1080,1280x720,auto
    set gfxpayload=keep
    insmod all_video
    if terminal_output gfxterm ; then
        set theme=/boot/grub/theme.txt
        export theme
    fi
fi

# Menu colors
set color_normal=light-gray/black
set color_highlight=white/red

menuentry "NEXUS OS (VMware Mode - Default)" --class nexus --class os {
    echo "Loading NEXUS OS kernel..."
    multiboot2 /boot/nexus-kernel.bin
    module2 /boot/nexus-kernel.bin
    boot
}

menuentry "NEXUS OS (Safe Mode)" --class nexus --class os {
    echo "Loading NEXUS OS in Safe Mode..."
    multiboot2 /boot/nexus-kernel.bin nomodeset nosmp noapic
    boot
}

menuentry "NEXUS OS (Debug Mode)" --class nexus --class os {
    echo "Loading NEXUS OS in Debug Mode..."
    multiboot2 /boot/nexus-kernel.bin debug loglevel=7 earlyprintk=vga
    boot
}

menuentry "NEXUS OS (Native Mode)" --class nexus --class os {
    echo "Loading NEXUS OS in Native Mode..."
    multiboot2 /boot/nexus-kernel.bin virt=native
    boot
}

submenu "Advanced Options..." --class advanced {
    menuentry "NEXUS OS (Recovery Mode)" {
        multiboot2 /boot/nexus-kernel.bin recovery=1
        boot
    }

    menuentry "NEXUS OS (Single User Mode)" {
        multiboot2 /boot/nexus-kernel.bin single
        boot
    }

    menuentry "Memory Test (MemTest86)" --class test {
        linux16 /boot/memtest86.bin
        boot
    }
}

menuentry "Terminal / Shell" --class terminal {
    echo "Loading terminal..."
    linux16 /boot/shell.elf
    boot
}

menuentry "Restart" --class restart {
    reboot
}

menuentry "Shutdown" --class shutdown {
    halt
}
