set timeout=10
set default=0
set gfxmode=1024x768
set gfxpayload=keep

# NEXUS OS Boot Menu
set menu_color_highlight=black/blue
set menu_color_normal=light-gray/black

menuentry "🖥️  NEXUS OS - Graphical Mode (Default)" {
    set gfxpayload=1024x768x32
    multiboot2 /boot/nexus-kernel.bin
    module2 /boot/nexus-kernel.bin
    boot
}

menuentry "📟  NEXUS OS - Text Mode (VGA Console)" {
    set gfxpayload=text
    multiboot2 /boot/nexus-kernel.bin vga=791
    module2 /boot/nexus-kernel.bin
    boot
}

menuentry "🛡️  NEXUS OS - Safe Mode" {
    multiboot2 /boot/nexus-kernel.bin nomodeset nosmp noapic nolapic
    module2 /boot/nexus-kernel.bin
    boot
}

menuentry "🐛  NEXUS OS - Debug Mode" {
    multiboot2 /boot/nexus-kernel.bin debug loglevel=7 earlyprintk=vga
    module2 /boot/nexus-kernel.bin
    boot
}

menuentry "⚡  NEXUS OS - Native Hardware" {
    multiboot2 /boot/nexus-kernel.bin virt=native
    module2 /boot/nexus-kernel.bin
    boot
}
